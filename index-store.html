<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>苍井寿司 · 门店物料定位工具</title>
<script src="html2pdf.bundle.min.js"></script>
<style>
  :root {
    --brand: #E8A020;
    --brand-dark: #C4851A;
    --brand-light: #FFF3D6;
    --bg: #F5F0EB;
    --card: #FFFFFF;
    --border: #E5DDD5;
    --text: #2D2116;
    --text-muted: #8C7A66;
    --green: #283C02;
    --olive: #888E0B;
    --red: #D4380D;
    --blue: #1A6FBA;
    --shadow: 0 2px 12px rgba(45,33,22,0.08);
    --shadow-lg: 0 8px 32px rgba(45,33,22,0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #ECE8E3;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: #1A1A2E;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    flex-shrink: 0;
  }
  .header-logo { font-size: 18px; font-weight: 800; color: var(--brand); }
  .header-subtitle { font-size: 11px; color: rgba(255,255,255,0.5); margin-left: 12px; }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.18); }
  .header-btn.primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #1A1A2E;
    font-weight: 700;
  }
  .header-btn.primary:hover { background: var(--brand-dark); }

  /* Main 3-column */
  .main {
    display: flex;
    height: calc(100vh - 52px);
    overflow: hidden;
  }

  /* ===== LEFT: Area Library ===== */
  .sidebar-left {
    width: 240px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-title {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: #FAF8F5;
  }
  .area-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .area-card {
    padding: 10px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    cursor: grab;
    transition: all 0.15s;
    border: 2px solid transparent;
    user-select: none;
    position: relative;
  }
  .area-card:hover {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(232,160,32,0.12);
    transform: translateY(-1px);
  }
  .area-card.dragging { opacity: 0.4; transform: scale(0.95); }
  .area-card-name { font-weight: 600; font-size: 13px; }
  .area-card-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .area-card-tags { display: flex; gap: 4px; margin-top: 6px; }
  .area-card-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 500;
  }
  .tag-req { background: #E8F5E9; color: var(--green); }
  .tag-opt { background: #FFF3E0; color: #E65100; }
  .tag-mall { background: #E3F2FD; color: var(--blue); }

  /* ===== CENTER: Canvas ===== */
  .canvas-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .canvas-toolbar {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    z-index: 10;
  }
  .store-name-input {
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    background: white;
    outline: none;
    padding: 6px 10px;
    border-radius: 6px;
    width: 160px;
  }
  .store-type-select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    background: white;
    cursor: pointer;
  }
  .toolbar-hint { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .canvas-viewport {
    flex: 1;
    overflow: auto;
    position: relative;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,170,160,0.15) 39px, rgba(180,170,160,0.15) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,170,160,0.15) 39px, rgba(180,170,160,0.15) 40px),
      #FAF8F5;
  }
  .canvas-viewport.drag-over { background-color: #F5F0EB; }

  .canvas-stage {
    position: relative;
    min-width: 100%;
    min-height: 100%;
    width: 1600px;
    height: 1200px;
  }

  .canvas-placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #BCB5AA;
    pointer-events: none;
  }
  .canvas-placeholder-icon { font-size: 48px; opacity: 0.5; margin-bottom: 8px; }
  .canvas-placeholder-text { font-size: 14px; font-weight: 600; }
  .canvas-placeholder-sub { font-size: 12px; margin-top: 4px; }

  /* Placed block on canvas */
  .placed-block {
    position: absolute;
    min-width: 160px;
    min-height: 100px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    cursor: grab;
    user-select: none;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.1s;
    z-index: 1;
    display: flex;
    flex-direction: column;
  }
  .placed-block-resize {
    position: absolute;
    right: 0; bottom: 0;
    width: 14px; height: 14px;
    cursor: se-resize;
    background: rgba(0,0,0,0.15);
    border-radius: 10px 0 10px 0;
    z-index: 5;
  }
  .placed-block-resize::after {
    content: '';
    position: absolute;
    right: 3px; bottom: 3px;
    width: 5px; height: 5px;
    border-right: 2px solid rgba(255,255,255,0.8);
    border-bottom: 2px solid rgba(255,255,255,0.8);
    border-radius: 0 0 2px 0;
  }
  .placed-block-resize:hover { background: var(--brand); }
  .placed-block:hover { box-shadow: var(--shadow-lg); z-index: 10; }
  .placed-block:active { cursor: grabbing; }
  .placed-block.selected {
    box-shadow: 0 0 0 3px var(--brand), var(--shadow-lg);
    z-index: 20;
  }
  .placed-block-header {
    padding: 8px 12px;
    font-weight: 700;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(135deg, var(--block-color), var(--block-dark));
    color: white;
  }
  .placed-block-num {
    font-size: 10px;
    background: rgba(255,255,255,0.25);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .placed-block-remove {
    width: 18px; height: 18px;
    border: none; background: rgba(255,255,255,0.2);
    color: white; border-radius: 50%;
    cursor: pointer; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .placed-block-remove:hover { background: var(--red); }
  .placed-block-body {
    padding: 6px 10px 8px;
    background: white;
    font-size: 11px;
    overflow-y: auto;
    flex: 1;
  }
  .placed-block-equip {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
  }
  .placed-block-chip {
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .placed-block-subtitle {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-muted);
    margin-top: 6px;
    margin-bottom: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .placed-block-row {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    font-size: 10px;
    padding: 2px 0;
    border-bottom: 1px dashed rgba(0,0,0,0.05);
  }
  .placed-block-row:last-child { border-bottom: none; }
  .placed-block-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .dot-yellow { background: #F5A623; }
  .dot-blue { background: #1A6FBA; }
  .dot-green { background: #7CB342; }
  .placed-block-row-label {
    font-weight: 600;
    color: var(--text);
    flex-shrink: 0;
    word-break: break-all;
  }
  .placed-block-row-items {
    color: var(--text-muted);
    line-height: 1.35;
  }

  /* Area colors */
  .block-cashier        { --block-color: #E8A020; --block-dark: #C4851A; }
  .block-sushi-display  { --block-color: #1A6FBA; --block-dark: #155A99; }
  .block-serving-window { --block-color: #D4380D; --block-dark: #A02008; }
  .block-packing        { --block-color: #888E0B; --block-dark: #6B7009; }
  .block-nigiri         { --block-color: #0891B2; --block-dark: #0E7490; }
  .block-gunkan         { --block-color: #7C3AED; --block-dark: #6D28D9; }
  .block-prep           { --block-color: #78350F; --block-dark: #5C2A0C; }
  .block-storage        { --block-color: #78716C; --block-dark: #57534E; }
  .block-rice           { --block-color: #EA580C; --block-dark: #C2410C; }
  .block-freezer        { --block-color: #0D9488; --block-dark: #0F766E; }
  .block-fridge         { --block-color: #2563EB; --block-dark: #1D4ED8; }

  /* ===== RIGHT: Standards Panel ===== */
  .sidebar-right {
    width: 380px;
    background: var(--card);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .right-header {
    padding: 14px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: #FAF8F5;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .right-actions { display: flex; gap: 6px; }
  .right-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-muted);
  }
  .right-btn:hover { border-color: var(--brand); color: var(--brand); }

  .right-content {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }
  .right-empty {
    padding: 40px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .right-empty-icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
  .right-empty-text { font-size: 14px; font-weight: 500; }
  .right-empty-sub { font-size: 12px; margin-top: 6px; }

  /* Standards Content */
  .std-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .std-section:last-child { border-bottom: none; }
  .std-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .std-subtitle {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin: 12px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .std-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin: 8px 0;
  }
  .std-table th {
    background: var(--bg);
    padding: 6px 10px;
    text-align: left;
    font-weight: 600;
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }
  .std-table td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    vertical-align: top;
  }
  .std-list { margin: 8px 0; }
  .std-list-item {
    padding: 6px 0;
    font-size: 12px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .std-list-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--brand);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .std-chip {
    display: inline-block;
    padding: 2px 8px;
    font-size: 11px;
    border-radius: 12px;
    margin: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .std-note {
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 12px;
    background: var(--brand-light);
    border-radius: 6px;
    margin-top: 8px;
    line-height: 1.6;
  }
  .std-warning {
    font-size: 11px;
    color: var(--red);
    padding: 8px 12px;
    background: #FFF1F0;
    border-radius: 6px;
    margin-top: 8px;
    line-height: 1.6;
  }
  .std-sop-step {
    display: flex;
    gap: 10px;
    padding: 8px 10px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .std-sop-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--brand);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    flex-shrink: 0;
  }
  .std-sop-title { font-weight: 600; }
  .std-sop-detail { color: var(--text-muted); margin-top: 2px; }
  .std-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .std-input-row label { flex: 1; }
  .std-input {
    width: 56px;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-align: center;
    font-size: 12px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #D5CFC7; border-radius: 3px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 10px 20px;
    background: #2D2116;
    color: white;
    border-radius: 8px;
    font-size: 13px;
    z-index: 300;
    transition: transform 0.3s ease;
    box-shadow: var(--shadow-lg);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Export modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-title { font-size: 15px; font-weight: 700; }
  .modal-close { border: none; background: none; font-size: 18px; cursor: pointer; }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    background: #FAF8F5;
  }
  .modal-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .modal-btn.primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #1A1A2E;
    font-weight: 600;
  }

  /* ===== Export Sort Mode ===== */
  .doc-sort-handle {
    display: none;
    cursor: grab;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg);
    color: var(--text-muted);
    font-size: 14px;
    margin-right: 6px;
    user-select: none;
  }
  .doc-sort-handle:active { cursor: grabbing; }
  .doc-sort-active .doc-section {
    border: 2px dashed var(--brand);
    border-radius: var(--radius-sm);
    padding: 8px;
    margin: 0 -8px 16px;
    position: relative;
  }
  .doc-sort-active .doc-section .doc-sort-handle { display: inline-block; }
  .doc-sort-active .doc-sub-title {
    border: 1px dashed var(--brand);
    border-radius: 4px;
    padding: 4px 8px;
    margin: 4px 0;
    cursor: grab;
    display: flex;
    align-items: center;
  }
  .doc-sort-active .doc-sub-title::before {
    content: '≡';
    margin-right: 6px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .doc-sort-active .doc-sub-title:hover { background: var(--brand-light); }
  .doc-sort-dragging {
    opacity: 0.5;
    background: var(--brand-light);
  }
  .doc-sort-drop-zone {
    border-top: 3px solid var(--brand) !important;
    margin-top: 4px;
    padding-top: 4px;
  }

  /* Print preview doc style */
  /* Export doc preview styles (Feishu-inspired) */
  .doc-cover{text-align:center;padding:36px 0 24px;}
  .doc-cover-brand{font-size:12px;color:var(--brand);font-weight:600;letter-spacing:4px;margin-bottom:6px;}
  .doc-cover-title{font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
  .doc-cover-sub{font-size:13px;color:var(--text-muted);margin-bottom:16px;}
  .doc-cover-line{width:32px;height:2px;background:var(--brand);margin:0 auto 12px;border-radius:2px;}
  .doc-cover-meta{font-size:11px;color:var(--text-muted);}
  .doc-toc{padding:14px 16px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:20px;;break-after:always;page-break-after:always;}
  .doc-toc-title{font-size:18px;font-weight:800;margin-bottom:14px;color:var(--text);letter-spacing:6px;text-align:center;}
  .doc-toc-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:11px;color:var(--text-muted);}
  .doc-toc-num{width:18px;height:18px;display:flex;align-items:center;justify-content:center;background:var(--brand-light);color:var(--brand-dark);font-size:10px;font-weight:700;border-radius:3px;flex-shrink:0;}
  .doc-section { margin-bottom: 20px; }
  .doc-h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .doc-h2-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--brand);color:#fff;font-size:10px;font-weight:700;border-radius:5px;flex-shrink:0;}
.doc-h3{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed var(--border);color:var(--text);}
.doc-h3-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--text2);color:#fff;font-size:9px;font-weight:700;border-radius:4px;flex-shrink:0;}
.doc-toc-sub{padding-left:28px;}
  .doc-sub-title{font-size:12px;font-weight:600;color:var(--text);margin:10px 0 6px;padding-left:8px;border-left:3px solid var(--brand);}
  .doc-sub-sub-title{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
  .doc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;overflow-x:auto;}
  .doc-card-meta{background:var(--bg);border:none;}
  .doc-meta-row{font-size:10px;color:var(--text-muted);padding:2px 0;}
  .doc-meta-label{display:inline-block;background:var(--brand-light);color:var(--brand-dark);font-weight:600;font-size:10px;padding:0 6px;border-radius:3px;margin-right:6px;}
  .doc-table{width:100%;border-collapse:collapse;font-size:10px;}
  .doc-table thead th{background:var(--bg);font-weight:600;color:var(--text-muted);padding:5px 8px;text-align:left;border-bottom:2px solid var(--border);font-size:10px;white-space:nowrap;}
  .doc-table tbody td{padding:5px 8px;border-bottom:1px solid #F2F0ED;color:var(--text);font-size:10px;}
  .doc-table tbody tr:last-child td{border-bottom:none;}
  .doc-table-stripe tbody tr:nth-child(even){background:#FAFAF8;}
  .doc-step-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--brand-light);color:var(--brand-dark);font-weight:700;font-size:10px;border-radius:50%;}
  .doc-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}

<div class="header">
  <div style="display:flex;align-items:center;">
    <span class="header-logo">苍井寿司</span>
    <span class="header-subtitle">门店物料定位工具 v1.2.1（门店端）</span>
  </div>
  <div class="header-actions">
    <span id="lastUpdateTime" style="font-size:11px;color:rgba(255,255,255,0.7);margin-right:8px;"></span>
    <button class="header-btn" onclick="refreshFromGitHub()" title="从GitHub刷新最新标准数据" id="refreshBtn">🔄 刷新数据</button>
    <button class="header-btn warning" onclick="clearCache()" title="清除本地缓存并从GitHub重新加载">🗑️ 清除缓存</button>
    <button class="header-btn" onclick="clearAll()">清空全部</button>
    <button class="header-btn" onclick="loadTemplate()" title="按店铺类型加载标准模板">📋 模版</button>
    <button class="header-btn primary" onclick="exportAll()">生成完整文档</button>
  </div>
</div>

<div class="main">
  <!-- LEFT: Area Library -->
  <div class="sidebar-left">
    <div class="sidebar-title">区域模块库</div>
    <div class="area-list" id="areaList"></div>
  </div>

  <!-- CENTER: Canvas -->
  <div class="canvas-wrap">
    <div class="canvas-toolbar">
      <input type="text" class="store-name-input" id="storeName" placeholder="门店名称" value="">
      <select class="store-type-select" id="storeType">
        <option value="standard">标准店</option>
        <option value="mall">商场铺</option>
      </select>
      <span class="toolbar-hint" id="toolbarHint">从左侧拖拽区域到画布任意位置</span>
    </div>
    <div class="canvas-viewport" id="canvasViewport"
         ondragover="onDragOverCanvas(event)"
         ondragleave="onDragLeaveCanvas(event)"
         ondrop="onDropCanvas(event)">
      <div class="canvas-stage" id="canvasStage">
        <div class="canvas-placeholder" id="canvasPlaceholder">
          <div class="canvas-placeholder-icon">🗺️</div>
          <div class="canvas-placeholder-text">拖拽区域模块到此处</div>
          <div class="canvas-placeholder-sub">自由摆放 · 右下角拖拽调整大小</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Standards Panel -->
  <div class="sidebar-right">
    <div class="right-header">
      <span>定位标准</span>
      <div class="right-actions">
        <button class="right-btn" onclick="exportAreaDoc()">导出</button>
      </div>
    </div>
    <div class="right-content" id="rightContent">
      <div class="right-empty">
        <div class="right-empty-icon">📋</div>
        <div class="right-empty-text">点击画布上的区域</div>
        <div class="right-empty-sub">查看该区域的完整定位标准</div>
      </div>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <div class="modal-title">📋 门店营运标准手册</div>
      <button class="modal-close" onclick="closeExportModal()">✕</button>
    </div>
    <div class="modal-body" id="exportBody"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;">📑 输出内容选择：</div>
      <label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;font-size:12px;color:var(--text-muted);">
        <input type="checkbox" id="includeServiceFlow" checked style="accent-color:var(--brand);" onchange="updateExportPreview()">
        <span>包含服务流程标准</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;font-size:12px;color:var(--text-muted);">
        <input type="checkbox" id="includePurchasing" checked style="accent-color:var(--brand);" onchange="updateExportPreview()">
        <span>包含需购置物料清单</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;font-size:12px;color:var(--text-muted);">
        <input type="checkbox" id="includeReplenish" checked style="accent-color:var(--brand);" onchange="updateExportPreview()">
        <span>包含补货流转链路</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;font-size:12px;color:var(--text-muted);">
        <input type="checkbox" id="includeLabelSystem" checked style="accent-color:var(--brand);" onchange="updateExportPreview()">
        <span>包含标示牌颜色系统</span>
      </label>
    </div>
    <div class="modal-footer" style="flex-wrap:wrap;gap:6px;">
      <button class="modal-btn" onclick="downloadHTML()">🌐 HTML</button>
      <button class="modal-btn" onclick="downloadCSV()">📊 CSV</button>
      <button class="modal-btn" onclick="downloadLongImage()">🖼️ 长图</button>
      <button class="modal-btn primary" onclick="downloadPDF()">📄 PDF</button>
    </div>
  </div>
</div>

  'prep-workstation': '🍳', 'storage-shelf': '🏭', 'rice-cooking': '🍚',

let dragSourceId = null;
let dragBlockId = null;
let areaInstanceCounters = {}; // { areaId: nextNum }

// ============ INIT ============
const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/RainG0106/store-positioning-tool/main';

async function init() {
  console.log('[init] Starting...');

  // 0. Show last update time
  const lastUpdate = localStorage.getItem('store_standards_last_update');
  const timeEl = document.getElementById('lastUpdateTime');
  if (timeEl && lastUpdate) {
    timeEl.textContent = '最后更新：' + lastUpdate;
  }

  // 1. Try localStorage cache first (avoids repeat network requests)
  const cached = localStorage.getItem('store_standards_cache');
  if (cached) {
    try {
      const cachedData = JSON.parse(cached);
      // 验证缓存数据有效性
      if (cachedData && Array.isArray(cachedData.areas) && cachedData.areas.length > 0) {
        standards = cachedData;
        console.log('[init] Loaded from localStorage cache, areas:', standards.areas.length);
        renderAreaList();
        updatePlaceholder();
      } else {
        console.warn('[init] Cached data invalid, removing cache');
        localStorage.removeItem('store_standards_cache');
      }
    } catch(e) { localStorage.removeItem('store_standards_cache'); }
  }

  // 2. Fetch latest from GitHub (non-blocking, updates cache)
  try {
    const res = await fetch(GITHUB_RAW_BASE + '/standards.json?t=' + Date.now());
    if (res.ok) {
      const data = await res.json();
      // 验证数据有效性：必须包含非空的 areas 数组
      if (data && Array.isArray(data.areas) && data.areas.length > 0) {
        standards = data;
        localStorage.setItem('store_standards_cache', JSON.stringify(data));

        // Save update time
        const now = new Date();
        const timeStr = now.toLocaleString('zh-CN');
        localStorage.setItem('store_standards_last_update', timeStr);
        if (timeEl) timeEl.textContent = '最后更新：' + timeStr;

        console.log('[init] Loaded from GitHub, areas:', standards.areas.length);
        renderAreaList();
        updatePlaceholder();
        return;
      } else {
        console.warn('[init] GitHub data invalid or empty areas, falling back');
      }
    }
  } catch(e) {
    console.warn('[init] GitHub fetch failed, using cached/embedded data');
  }

  // 3. Fall back to embedded JSON (only if no valid data yet)
  if (!standards || !Array.isArray(standards.areas) || standards.areas.length === 0) {
    loadEmbeddedStandards();
  }
  renderAreaList();
  updatePlaceholder();
  console.log('[init] Done. Areas:', standards?.areas?.length);
}

function loadEmbeddedStandards() {
  try {
    const el = document.getElementById('std-data');
    if (el) {
      standards = JSON.parse(el.textContent);
      console.log('[init] Embedded JSON loaded, areas:', standards.areas?.length);
    } else {
      throw new Error('no embedded data element');
    }
  } catch(e) {
    console.warn('[init] Embedded JSON failed, using fallback:', e.message);
    standards = getFallbackStandards();
  }
}

// ============ LEFT: Area List ============
let editingAreaId = null; // removed in store version

function renderAreaList() {
  const el = document.getElementById('areaList');
  if (!el) { console.error('[renderAreaList] areaList element not found'); return; }
  el.innerHTML = '';
  if (!standards || !Array.isArray(standards.areas)) {
    console.error('[renderAreaList] standards or standards.areas missing', standards);
    return;
  }
  console.log('[renderAreaList] Rendering', standards.areas.length, 'areas');
  standards.areas.forEach(area => {
    let tag = area.required ? '<span class="area-card-tag tag-req">必配</span>'
      : area.storeType === '商场铺' ? '<span class="area-card-tag tag-mall">商场铺</span>'
      : '<span class="area-card-tag tag-opt">选配</span>';
    const card = document.createElement('div');
    card.className = 'area-card';
    card.draggable = true;
    card.dataset.areaId = area.id;
    card.innerHTML = `
      <div class="area-card-name">${AREA_ICONS[area.id] || ''} ${area.name}</div>
      <div class="area-card-desc">${area.description || ''}</div>
      <div class="area-card-tags">${tag}</div>
    `;
    card.addEventListener('dragstart', e => {
      dragSourceId = area.id;
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', area.id);
      e.dataTransfer.effectAllowed = 'copy';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      dragSourceId = null;
    });
    el.appendChild(card);
  });
}

// ============ CANVAS: Drop =============
function onDragOverCanvas(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  document.getElementById('canvasViewport').classList.add('drag-over');
}
function onDragLeaveCanvas(e) {
  document.getElementById('canvasViewport').classList.remove('drag-over');
}
function onDropCanvas(e) {
  e.preventDefault();
  document.getElementById('canvasViewport').classList.remove('drag-over');
  const areaId = e.dataTransfer.getData('text/plain');
  if (!areaId) return;

  const areaData = standards.areas.find(a => a.id === areaId);
  if (!areaData) return;
  const storeType = document.getElementById('storeType').value;
  if (areaData.storeType === '商场铺' && storeType !== 'mall') {
    showToast('寿司展示柜仅适用于商场铺'); return;
  }

  const stage = document.getElementById('canvasStage');
  const rect = stage.getBoundingClientRect();
  // Simple grid snap: 40px (centered on mouse)
  let x = Math.round((e.clientX - rect.left - 100) / 40) * 40;
  let y = Math.round((e.clientY - rect.top - 20) / 40) * 40;
  x = Math.max(0, x); y = Math.max(0, y);

  const instId = 'block-' + Date.now();
  areaInstanceCounters[areaId] = (areaInstanceCounters[areaId] || 0) + 1;
  placedAreas.push({
    id: areaId, instanceId: instId,
    x, y,
    w: 200, h: 160,
    num: areaInstanceCounters[areaId],
    cabinetCount: getDefaultCabinet(areaData),
  });
  syncCabinetCounts(areaId);

  renderBlockOnCanvas(instId);
  selectBlock(instId);
  updatePlaceholder();
  updateToolbar();
  showToast(`? 已添加「${areaData.name} #${areaInstanceCounters[areaId]}」`);
}

function getDefaultCabinet(area) {
  const existing = placedAreas.filter(a => a.id === area.id).length;
  if (area.id === 'packing-station') return { upper: existing + 1, lower: existing + 1 };
  if (area.id === 'sushi-display') return { bottom: existing + 1 };
  if (area.id === 'storage-shelf') return { racks: existing + 1 };
  return {};
}

function syncCabinetCounts(areaId) {
  const blocks = placedAreas.filter(a => a.id === areaId).sort((a, b) => a.num - b.num);
  const count = blocks.length;
  blocks.forEach((block, idx) => {
    block.num = idx + 1;
    if (areaId === 'packing-station') { block.cabinetCount.upper = count; block.cabinetCount.lower = count; }
    else if (areaId === 'sushi-display') block.cabinetCount.bottom = count;
    else if (areaId === 'storage-shelf') block.cabinetCount.racks = count;
  });
  // Re-render all blocks of this area type so titles & content update
  blocks.forEach(block => renderBlockOnCanvas(block.instanceId));
}

function collectItems(areaData) {
  let tools = [];
  let materials = [];
  let notices = [];
  let displays = [];

  // Area-level
  if (areaData.equipment) tools.push(...areaData.equipment);
  if (areaData.standards) {
    if (Array.isArray(areaData.standards)) notices.push(...areaData.standards);
    else if (areaData.standards.notes) notices.push(areaData.standards.notes);
  }

  // Top-level items
  if (areaData.items) {
    areaData.items.forEach(cat => {
      const isTool = cat.labelColor === 'blue';
      (isTool ? tools : materials).push(...cat.items);
    });
  }
  if (areaData.areas) {
    areaData.areas.forEach(cat => {
      const isTool = cat.labelColor === 'blue';
      (isTool ? tools : materials).push(...cat.items);
    });
  }

  // Sub-areas
  if (areaData.subAreas) {
    areaData.subAreas.forEach(sub => {
      if (sub.notices) notices.push(...sub.notices);
      if (sub.warning) notices.push(sub.warning);
      if (sub.standards) notices.push(...sub.standards);

      if (sub.drawers) {
        sub.drawers.forEach(d => {
          const isTool = d.labelColor === 'blue';
          const name = d.name || ('柜筒'+d.position);
          (isTool ? tools : materials).push(name + '：' + d.items.join('、'));
        });
      }
      if (sub.items) {
        sub.items.forEach(cat => {
          const isTool = cat.labelColor === 'blue';
          const prefix = cat.level ? ('L'+cat.level+'·') : '';
          (isTool ? tools : materials).push(prefix + cat.category + '：' + cat.items.join('、'));
        });
      }
      if (sub.displayOrder) {
        sub.displayOrder.forEach(d => {
          displays.push(d.category + '：' + d.items.join('、'));
        });
      }
      if (sub.shelfRequirements) notices.push(...sub.shelfRequirements);
    });
  }

  // Deduplicate
  tools = [...new Set(tools)];
  materials = [...new Set(materials)];
  notices = [...new Set(notices)];
  displays = [...new Set(displays)];

  return { tools, materials, notices, displays };
}

function getBlockTitle(areaData, block) {
  const icon = AREA_ICONS[block.id] || '';
  const num = block.num || 1;
  if (areaData.id === 'packing-station') {
    const drawerSub = (areaData.subAreas || []).find(s => s.id === 'packing-upper-drawers');
    if (drawerSub && drawerSub.drawers) {
      const drawer = drawerSub.drawers.find(d => d.position === num);
      if (drawer) return `${icon} ${areaData.name}·${drawer.name || '柜筒' + num}`;
    }
  }
  return `${icon} ${areaData.name}`;
}

function buildBlockBodyHTML(areaData, block) {
  let html = '';
  const blockNum = block.num || 1;

  // Packing station: each instance shows only the corresponding drawer
  if (areaData.id === 'packing-station') {
    const drawerSub = (areaData.subAreas || []).find(s => s.id === 'packing-upper-drawers');
    if (drawerSub && drawerSub.drawers) {
      const drawer = drawerSub.drawers.find(d => d.position === blockNum);
      if (drawer) {
        const dotClass = drawer.labelColor === 'blue' ? 'dot-blue' : drawer.labelColor === 'green' ? 'dot-green' : 'dot-yellow';
        html += `<div class="placed-block-subtitle">${drawer.name || '柜筒' + drawer.position}</div>`;
        html += `<div class="placed-block-row" style="font-size:10px;">
          <div class="placed-block-dot ${dotClass}"></div>
          <div class="placed-block-row-items">${drawer.items.join('、')}</div>
        </div>`;
        if (drawer.partition) {
          html += `<div style="font-size:9px;color:var(--text-muted);margin-top:4px;padding-left:11px;">隔栏：${drawer.partition}</div>`;
        }
      } else {
        // blockNum exceeds drawer count, show all drawers summary
        drawerSub.drawers.forEach(drawer => {
          html += `<div class="placed-block-row" style="font-size:10px;">
            <div class="placed-block-dot dot-yellow"></div>
            <div class="placed-block-row-items">${drawer.name || '柜筒' + drawer.position}：${drawer.items.join('、')}</div>
          </div>`;
        });
      }
    }
    return html;
  }

  const { tools, materials, displays } = collectItems(areaData);

  // Section 1: 设备
  if (tools.length) {
    html += `<div class="placed-block-subtitle">设备</div>`;
    html += `<div class="placed-block-equip">${tools.map(e => `<span class="placed-block-chip">${e}</span>`).join('')}</div>`;
  }

  // Section 2: 陈列产品 (displayOrder)
  if (displays.length) {
    html += `<div class="placed-block-subtitle">陈列产品</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:2px;">`;
    displays.forEach(m => {
      html += `<div class="placed-block-row" style="font-size:10px;">
        <div class="placed-block-dot dot-yellow"></div>
        <div class="placed-block-row-items" style="word-break:break-all;">${m}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Section 3: 存放物料
  if (materials.length) {
    html += `<div class="placed-block-subtitle">存放物料</div>`;
    html += `<div style="display:flex;flex-direction:column;gap:2px;">`;
    materials.forEach(m => {
      html += `<div class="placed-block-row" style="font-size:10px;">
        <div class="placed-block-dot dot-green"></div>
        <div class="placed-block-row-items" style="word-break:break-all;">${m}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Fallback: always show something
  if (!html) {
    if (areaData.equipment && areaData.equipment.length) {
      html += `<div class="placed-block-subtitle">设备</div>`;
      html += `<div class="placed-block-equip">${areaData.equipment.map(e => `<span class="placed-block-chip">${e}</span>`).join('')}</div>`;
    } else {
      html += `<div style="font-size:10px;color:var(--text-muted);padding-top:8px;text-align:center;">暂无详细数据</div>`;
    }
  }

  return html;
}

function renderBlockOnCanvas(instId) {
  const block = placedAreas.find(a => a.instanceId === instId);
  const areaData = standards.areas.find(a => a.id === block.id);
  if (!areaData) return;

  const stage = document.getElementById('canvasStage');
  const existing = document.getElementById(instId);
  if (existing) existing.remove();

  const el = document.createElement('div');
  el.id = instId;
  el.className = `placed-block ${BLOCK_CLASS_MAP[block.id] || ''}`;
  el.style.left = block.x + 'px';
  el.style.top = block.y + 'px';
  el.style.width = (block.w || 200) + 'px';
  el.style.height = (block.h || 160) + 'px';
  if (selectedId === instId) el.classList.add('selected');

  const bodyHTML = buildBlockBodyHTML(areaData, block);
  const blockTitle = getBlockTitle(areaData, block);

  el.innerHTML = `
    <div class="placed-block-header">
      <span>${blockTitle}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <span class="placed-block-num">#${block.num}</span>
        <button class="placed-block-remove" onclick="event.stopPropagation();removeBlock('${instId}')">×</button>
      </div>
    </div>
    <div class="placed-block-body" style="flex:1;overflow:auto;">${bodyHTML}</div>
    <div class="placed-block-resize" data-resize="${instId}"></div>
  `;

  // Click to select
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    selectBlock(instId);
  });

  // Drag to reposition (mousedown on body/header)
  el.addEventListener('mousedown', (e) => {
    if (e.target.closest('.placed-block-remove') || e.target.closest('.placed-block-resize')) return;
    startBlockDrag(e, instId);
  });

  // Resize handle
  const resizeHandle = el.querySelector('.placed-block-resize');
  resizeHandle.addEventListener('mousedown', (e) => startBlockResize(e, instId));

  stage.appendChild(el);
}

// ============ BLOCK DRAG (reposition) ============
let blockDragState = null;
function startBlockDrag(e, instId) {
  if (e.target.closest('.placed-block-remove')) return;
  e.preventDefault();
  const el = document.getElementById(instId);
  const block = placedAreas.find(a => a.instanceId === instId);
  blockDragState = {
    instId,
    startX: e.clientX, startY: e.clientY,
    origX: block.x, origY: block.y,
    el
  };
  el.style.cursor = 'grabbing';
  el.style.zIndex = 50;
  document.addEventListener('mousemove', onBlockDragMove);
  document.addEventListener('mouseup', onBlockDragEnd);
}
function onBlockDragMove(e) {
  if (!blockDragState) return;
  const { startX, startY, origX, origY, el } = blockDragState;
  let dx = e.clientX - startX;
  let dy = e.clientY - startY;
  let nx = origX + dx;
  let ny = origY + dy;
  // Snap to grid
  nx = Math.round(nx / 40) * 40;
  ny = Math.round(ny / 40) * 40;
  nx = Math.max(0, nx); ny = Math.max(0, ny);
  el.style.left = nx + 'px';
  el.style.top = ny + 'px';
}
function onBlockDragEnd(e) {
  if (!blockDragState) return;
  const { instId, startX, startY, origX, origY } = blockDragState;
  let dx = e.clientX - startX;
  let dy = e.clientY - startY;
  const block = placedAreas.find(a => a.instanceId === instId);
  block.x = Math.round((origX + dx) / 40) * 40;
  block.y = Math.round((origY + dy) / 40) * 40;
  block.x = Math.max(0, block.x); block.y = Math.max(0, block.y);

  const el = document.getElementById(instId);
  el.style.left = block.x + 'px';
  el.style.top = block.y + 'px';
  el.style.cursor = 'grab';
  el.style.zIndex = '';
  blockDragState = null;
  document.removeEventListener('mousemove', onBlockDragMove);
  document.removeEventListener('mouseup', onBlockDragEnd);
}

// ============ BLOCK RESIZE ============
let blockResizeState = null;
function startBlockResize(e, instId) {
  e.stopPropagation();
  e.preventDefault();
  const el = document.getElementById(instId);
  const block = placedAreas.find(a => a.instanceId === instId);
  blockResizeState = {
    instId,
    startX: e.clientX, startY: e.clientY,
    origW: block.w || 200, origH: block.h || 160,
    el
  };
  document.addEventListener('mousemove', onBlockResizeMove);
  document.addEventListener('mouseup', onBlockResizeEnd);
}
function onBlockResizeMove(e) {
  if (!blockResizeState) return;
  const { startX, startY, origW, origH, el } = blockResizeState;
  let nw = origW + (e.clientX - startX);
  let nh = origH + (e.clientY - startY);
  nw = Math.round(nw / 40) * 40;
  nh = Math.round(nh / 40) * 40;
  nw = Math.max(160, nw);
  nh = Math.max(100, nh);
  el.style.width = nw + 'px';
  el.style.height = nh + 'px';
}
function onBlockResizeEnd(e) {
  if (!blockResizeState) return;
  const { instId, startX, startY, origW, origH } = blockResizeState;
  const block = placedAreas.find(a => a.instanceId === instId);
  block.w = Math.round((origW + e.clientX - startX) / 40) * 40;
  block.h = Math.round((origH + e.clientY - startY) / 40) * 40;
  block.w = Math.max(160, block.w);
  block.h = Math.max(100, block.h);
  blockResizeState = null;
  document.removeEventListener('mousemove', onBlockResizeMove);
  document.removeEventListener('mouseup', onBlockResizeEnd);
}

function removeBlock(instId) {
  const removed = placedAreas.find(a => a.instanceId === instId);
  placedAreas = placedAreas.filter(a => a.instanceId !== instId);
  if (removed) syncCabinetCounts(removed.id);
  const el = document.getElementById(instId);
  if (el) el.remove();
  if (selectedId === instId) {
    selectedId = null;
    renderRightPanel();
  }
  updatePlaceholder();
  updateToolbar();
}

function selectBlock(instId) {
  // deselect old
  if (selectedId) {
    const old = document.getElementById(selectedId);
    if (old) old.classList.remove('selected');
  }
  selectedId = instId;
  const el = document.getElementById(instId);
  if (el) el.classList.add('selected');
  renderRightPanel();
}

function updatePlaceholder() {
  const ph = document.getElementById('canvasPlaceholder');
  ph.style.display = placedAreas.length === 0 ? 'block' : 'none';
}
function updateToolbar() {
  const uniqueCount = new Set(placedAreas.map(a => a.id)).size;
  document.getElementById('toolbarHint').textContent =
    placedAreas.length > 0 ? `已放置 ${placedAreas.length} 个区域（${uniqueCount} 种），拖拽移动位置，右下角拖动调整大小` : '从左侧拖拽区域到画布任意位置，右下角可调整大小';
}

// ============ RIGHT: Standards Panel ============
function renderRightPanel() {
  const container = document.getElementById('rightContent');
  if (!selectedId) {
    container.innerHTML = `
      <div class="right-empty">
        <div class="right-empty-icon">📋</div>
        <div class="right-empty-text">点击画布上的区域</div>
        <div class="right-empty-sub">查看该区域的完整定位标准</div>
      </div>`;
    return;
  }

  const block = placedAreas.find(a => a.instanceId === selectedId);
  if (!block) return;
  const area = standards.areas.find(a => a.id === block.id);
  if (!area) return;

  let html = '';

  // Title
  html += `<div class="std-section">
    <div class="std-title">${AREA_ICONS[block.id] || ''} ${area.name}</div>
    <div style="font-size:12px;color:var(--text-muted);">${area.description || ''}</div>
    ${area.positionRequirement ? `<div style="font-size:12px;color:var(--brand-dark);margin-top:4px;">📍 ${area.positionRequirement}</div>` : ''}
    ${area.temperature ? `<div style="font-size:12px;color:var(--blue);margin-top:4px;">🌡️ ${area.temperature}</div>` : ''}
  </div>`;

  // Equipment
  if (area.equipment && area.equipment.length) {
    html += `<div class="std-section">
      <div class="std-subtitle">设备清单</div>
      <div>${area.equipment.map(e => `<span class="std-chip">${e}</span>`).join('')}</div>
    </div>`;
  }

  // Cabinet config
  if (block.cabinetCount && Object.keys(block.cabinetCount).length) {
    html += `<div class="std-section">
      <div class="std-subtitle">柜子数量设置</div>`;
    const labels = { upper: '上层抽屉', lower: '下层柜', bottom: '底部柜', racks: '货架组' };
    for (const [key, val] of Object.entries(block.cabinetCount)) {
      html += `<div class="std-input-row">
        <label>${labels[key] || key}</label>
        <input type="number" class="std-input" value="${val}" min="1" max="20"
               onchange="updateCabinet('${block.instanceId}','${key}',this.value)">
        <span style="font-size:11px;color:var(--text-muted);">个</span>
      </div>`;
    }
    html += `</div>`;
  }

  // Sub areas
  if (area.subAreas) {
    area.subAreas.forEach(sub => {
      html += `<div class="std-section">`;
      html += `<div class="std-subtitle">${sub.name}</div>`;

      if (sub.type === 'sop') {
        if (sub.notices) {
          html += `<div class="std-warning">`;
          sub.notices.forEach(n => html += `• ${n}<br>`);
          html += `</div>`;
        }
        html += `<div class="std-list">`;
        sub.steps.forEach(s => {
          html += `<div class="std-sop-step">
            <div class="std-sop-num">${s.step}</div>
            <div>
              <div class="std-sop-title">${s.action}</div>
              <div class="std-sop-detail">${s.detail}</div>
            </div>
          </div>`;
        });
        html += `</div>`;
      } else if (sub.drawers) {
        html += `<table class="std-table"><tr><th>柜筒</th><th>存放内容</th><th>隔栏</th></tr>`;
        sub.drawers.forEach(d => {
          html += `<tr><td>第${d.position}个</td><td>${d.items.join('、')}</td><td>${d.partition||'—'}</td></tr>`;
        });
        html += `</table>`;
      } else if (sub.items) {
        html += `<table class="std-table"><tr><th>分类</th><th>物品</th></tr>`;
        sub.items.forEach(cat => {
          html += `<tr><td>${cat.level?`第${cat.level}层 · `:''}${cat.category}</td><td>${cat.items.join('、')}</td></tr>`;
        });
        html += `</table>`;
      }

      if (sub.temperature) html += `<div style="font-size:11px;color:var(--blue);margin-top:6px;">温度：${sub.temperature}</div>`;
      if (sub.warning) html += `<div class="std-warning" style="margin-top:6px;">⚠️ ${sub.warning}</div>`;
      if (sub.standards) {
        html += `<div class="std-note" style="margin-top:6px;">`;
        sub.standards.forEach(s => html += `• ${s}<br>`);
        html += `</div>`;
      }
      if (sub.cabinetRequirements) {
        html += `<div style="margin-top:6px;"><table class="std-table"><tr><th>项目</th><th>标准</th></tr>`;
        const names = {door:'门板',interior:'内部',material:'材质'};
        for (const [k,v] of Object.entries(sub.cabinetRequirements)) {
          html += `<tr><td>${names[k]||k}</td><td>${v}</td></tr>`;
        }
        html += `</table></div>`;
      }
      if (sub.containerSuggestion) {
        const c = sub.containerSuggestion;
        html += `<div class="std-note">📝 建议容器：${c.name}（${c.size}），单价${c.price}，建议${c.suggestedQty}</div>`;
      }
      html += `</div>`;
    });
  }

  // Area-level standards
  if (area.standards && area.standards.length) {
    html += `<div class="std-section">
      <div class="std-subtitle">📋 使用要求</div>
      <div class="std-list">`;
    area.standards.forEach(s => {
      html += `<div class="std-list-item"><div class="std-list-dot"></div><div>${s}</div></div>`;
    });
    html += `</div></div>`;
  }

  // Replenish flow (if applicable)
  if (area.replenishFlow || area.id === 'packing-station' || area.id === 'storage-shelf') {
    html += `<div class="std-section">
      <div class="std-subtitle">🔄 物料补货流转</div>
      <div class="std-note">入货 → 货架取货补充打包台下柜 → 新货按先进先出摆上货架</div>
    </div>`;
  }

  container.innerHTML = html;
}

function buildStoreLayoutHTML() {
  const COLOR_MAP = {
    'cashier':            { color: '#E8A020', dark: '#C4851A' },
    'sushi-display':      { color: '#1A6FBA', dark: '#155A99' },
    'serving-window':     { color: '#D4380D', dark: '#A02008' },
    'packing-station':    { color: '#888E0B', dark: '#6B7009' },
    'nigiri-workstation': { color: '#0891B2', dark: '#0E7490' },
    'gunkan-workstation': { color: '#7C3AED', dark: '#6D28D9' },
    'prep-workstation':   { color: '#78350F', dark: '#5C2A0C' },
    'storage-shelf':      { color: '#78716C', dark: '#57534E' },
    'rice-cooking':       { color: '#EA580C', dark: '#C2410C' },
    'freezer':            { color: '#0D9488', dark: '#0F766E' },
    'upright-fridge':     { color: '#2563EB', dark: '#1D4ED8' }
  };

  const maxX = Math.max(...placedAreas.map(b => b.x + (b.w || 200)));
  const maxY = Math.max(...placedAreas.map(b => b.y + (b.h || 160)));
  const scale = maxX > 720 ? 720 / maxX : 1;

  // 按 Y 坐标分入行（容差 40px）
  const rows = [];
  const rowThreshold = 40;
  placedAreas.forEach((block, idx) => {
    const area = standards.areas.find(a => a.id === block.id);
    if (!area) return;
    const y = block.y;
    let row = rows.find(r => Math.abs(r.y - y) <= rowThreshold);
    if (!row) { row = { y, blocks: [] }; rows.push(row); }
    row.blocks.push({ block, idx, area });
  });
  rows.sort((a, b) => a.y - b.y);
  rows.forEach(r => r.blocks.sort((a, b) => a.block.x - b.block.x));

  let html = '<div class="doc-store-layout">';

  rows.forEach(row => {
    html += '<div class="doc-store-row">';
    row.blocks.forEach(({ block, idx, area }) => {
      const colors = COLOR_MAP[area.id] || { color: '#888E0B', dark: '#6B7009' };
      const icon = AREA_ICONS[area.id] || '📦';
      const blockNum = block.num || 1;
      const displayName = area.name + (blockNum > 1 ? ' #' + blockNum : '');
      const w = (block.w || 200) * scale;
      const h = (block.h || 160) * scale;

      html += '<div class="doc-store-block" style="width:' + w + 'px;min-height:' + h + 'px;">';
      html += '<div class="doc-store-header" style="background:' + colors.color + ';">';
      html += '<span class="doc-store-icon">' + icon + '</span>';
      html += '<span class="doc-store-name">' + displayName + '</span>';
      html += '<span class="doc-store-num">#' + (idx + 1) + '</span>';
      html += '</div>';
      html += '<div class="doc-store-body">';
      html += buildBlockBodyHTML(area, block);
      html += '</div></div>';
    });
    html += '</div>';
  });

  html += '</div>';
  return html;
}

function esc(s) { return String(s || '').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function buildDocHTML(storeName, opts) {
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  if (!opts) opts = { includePurchasing:true, includeReplenish:true, includeLabelSystem:true, includeServiceFlow:false };
  let html = '';

  // ===== Cover / Header =====
  html += `<div class="doc-cover">
    <div class="doc-cover-brand">苍井寿司</div>
    <div class="doc-cover-title">${storeName}</div>
    <div class="doc-cover-sub">营运标准手册</div>
    <div class="doc-cover-line"></div>
    <div class="doc-cover-meta">培训部 · ${dateStr}</div>
  </div>`;

  // ===== TOC =====
  const CN_PARTS = ['一','二','三','四','五','六','七','八','九','十'];
  let tocIdx = 0;
  html += `<div class="doc-toc">
    <div class="doc-toc-title">目　录</div>`;
  html += `<div class="doc-toc-item"><span class="doc-toc-num">${CN_PARTS[tocIdx]}</span><span>门店定位系统</span></div>`; tocIdx++;
  // 门店定位系统的二级目录：按 standards.areas 顺序，只显示已放置的区域
  let tocSubIdx = 1;
  standards.areas.forEach(area => {
    const blocks = placedAreas.filter(block => block.id === area.id);
    if (blocks.length === 0) return;
    const icon = AREA_ICONS[area.id] || '';
    html += `<div class="doc-toc-item doc-toc-sub"><span class="doc-toc-num">${tocSubIdx}</span><span>${icon} ${area.name}</span></div>`;
    tocSubIdx++;
  });
  if (opts.includePurchasing && standards.purchasingMaterials && standards.purchasingMaterials.length) {
    html += `<div class="doc-toc-item"><span class="doc-toc-num">${CN_PARTS[tocIdx]}</span><span>需购置物料清单</span></div>`; tocIdx++;
  }
  if (opts.includeLabelSystem && standards.labelColorSystem) {
    html += `<div class="doc-toc-item"><span class="doc-toc-num">${CN_PARTS[tocIdx]}</span><span>标示牌颜色系统</span></div>`; tocIdx++;
  }
  if (opts.includeReplenish && standards.replenishFlow && standards.replenishFlow.steps) {
    html += `<div class="doc-toc-item"><span class="doc-toc-num">${CN_PARTS[tocIdx]}</span><span>补货流转链路</span></div>`; tocIdx++;
  }
  if (opts.includeServiceFlow) {
    html += `<div class="doc-toc-item"><span class="doc-toc-num">${CN_PARTS[tocIdx]}</span><span>服务流程标准</span></div>`; tocIdx++;
    // 服务流程标准的二级目录
    let sfData = null;
    try {
      const saved = localStorage.getItem('workbuddy_service_flow');
      if (saved) sfData = JSON.parse(saved);
    } catch(e) {}
    if (!sfData) sfData = SERVICE_FLOW_EMBEDDED;
    if (sfData && sfData.modules) {
      sfData.modules.forEach((mod, mi) => {
        html += `<div class="doc-toc-item doc-toc-sub"><span class="doc-toc-num">${mi+1}</span><span>${esc(mod.title)}</span></div>`;
      });
    }
  }
  html += `</div>`;

  let partIdx = 0;
  // ===== Part 1: Store Location System (parent section for all areas) =====
  if (placedAreas.length > 0) {
    html += `<div class="doc-part-divider"></div>
      <div class="doc-section">
      <div class="doc-part-label">第${CN_PARTS[partIdx]}部分</div>
      <div class="doc-h2">门店定位系统</div>`;

    // 1. 画布布局图（按实际坐标排列）
    html += `<div style="margin-bottom:20px;">`;
    html += `<div style="font-size:12px;font-weight:600;color:#2D2116;margin-bottom:10px;">📐 门店平面布局图</div>`;
    html += buildStoreLayoutHTML();
    html += `</div>`;

    // 2. 文字详细清单（V8 风格）
    html += `<div style="font-size:12px;font-weight:600;color:#2D2116;margin:16px 0 10px;padding-top:12px;border-top:2px solid #E5DDD5;">📝 各区域详细清单</div>`;

    let docIdx = 0;
    standards.areas.forEach(area => {
      const blocks = placedAreas.filter(block => block.id === area.id);
      if (blocks.length === 0) return;

      blocks.forEach((block, blockIdx) => {
      const icon = AREA_ICONS[area.id] || '';

      let sectionTitle = `${icon} ${area.name}`;
      if (area.id === 'packing-station' && block.num) {
        const drawerSub = (area.subAreas || []).find(s => s.id === 'packing-upper-drawers');
        if (drawerSub && drawerSub.drawers) {
          const drawer = drawerSub.drawers.find(d => d.position === block.num);
          if (drawer) sectionTitle = `${icon} ${area.name}·${drawer.name || '柜筒'+block.num}`;
        }
      }
      html += `<div class="doc-section">
        <div class="doc-h3"><span class="doc-h3-num">${docIdx+1}</span>${sectionTitle}</div>`;
      docIdx++;

      // Description & meta info as a card
      if (area.description || area.positionRequirement || area.temperature || area.storageMode || area.note) {
        html += `<div class="doc-card doc-card-meta">
          <div class="doc-meta-row">${area.description || ''}</div>`;
        if (area.positionRequirement) html += `<div class="doc-meta-row"><span class="doc-meta-label">位置要求</span>${area.positionRequirement}</div>`;
        if (area.temperature) html += `<div class="doc-meta-row"><span class="doc-meta-label">温度要求</span>${area.temperature}</div>`;
        if (area.storageMode) html += `<div class="doc-meta-row"><span class="doc-meta-label">存放模式</span>${area.storageMode}</div>`;
        if (area.storageRule) html += `<div class="doc-meta-row"><span class="doc-meta-label">存放规则</span>${area.storageRule}</div>`;
        if (area.note) html += `<div class="doc-meta-row" style="color:var(--text-muted);">${area.note}</div>`;
        if (area.coreNote) html += `<div class="doc-meta-row" style="color:#D4380D;font-weight:600;">${area.coreNote}</div>`;
        if (area.rackRequirements) html += `<div class="doc-meta-row"><span class="doc-meta-label">货架要求</span>离地${area.rackRequirements.safetyDistance && area.rackRequirements.safetyDistance.fromGround || ''} / 离墙${area.rackRequirements.safetyDistance && area.rackRequirements.safetyDistance.fromWall || ''} · ${area.rackRequirements.material || ''}材质</div>`;
        html += `</div>`;
      }

      // Equipment chips
      if (area.equipment && area.equipment.length) {
        html += `<div class="doc-sub-title">设备清单</div>
          <div class="doc-chips">${area.equipment.map(e => `<span class="doc-chip">${e}</span>`).join('')}</div>`;
      }

      // SubAreas
      if (area.subAreas) {
        area.subAreas.forEach(sub => {
          if (area.id === 'packing-station' && sub.id === 'packing-lower-cabinet') {
            const lastPacking = [...placedAreas].reverse().find(a => a.id === 'packing-station');
            if (lastPacking && lastPacking.instanceId !== block.instanceId) return;
          }
          html += `<div class="doc-sub-title">${sub.name}</div>`;

          // Temperature badge for fridge areas
          if (sub.temperature) {
            html += `<div class="doc-temp-badge">${sub.temperature}</div>`;
          }

          if (sub.type === 'sop') {
            // SOP: show notices as warning cards, then steps table
            if (sub.notices && sub.notices.length) {
              html += `<div class="doc-callout doc-callout-warn">`;
              sub.notices.forEach(n => { html += `<div class="doc-callout-item">${n}</div>`; });
              html += `</div>`;
            }
            html += `<div class="doc-card">
              <table class="doc-table doc-table-steps">
                <thead><tr><th style="width:60px;">步骤</th><th style="width:100px;">操作</th><th>细节说明</th></tr></thead>
                <tbody>`;
            sub.steps.forEach(s => {
              html += `<tr><td><div class="doc-step-num">${s.step}</div></td><td><strong>${s.action}</strong></td><td>${s.detail}</td></tr>`;
            });
            html += `</tbody></table></div>`;
          } else if (sub.drawers) {
            // Drawers layout
            let drawersToShow = sub.drawers;
            if (area.id === 'packing-station' && block.num) {
              const matched = sub.drawers.find(d => d.position === block.num);
              if (matched) drawersToShow = [matched];
            }
            html += `<div class="doc-card">
              <table class="doc-table doc-table-stripe">
                <thead><tr><th style="width:70px;">柜筒</th><th>名称</th><th>存放物品</th><th>隔栏方式</th></tr></thead>
                <tbody>`;
            drawersToShow.forEach(d => {
              const dotClass = d.labelColor === 'blue' ? 'doc-dot-blue' : d.labelColor === 'green' ? 'doc-dot-green' : 'doc-dot-yellow';
              html += `<tr><td>第${d.position}个</td><td><span class="doc-inline-dot ${dotClass}"></span>${d.name||''}</td><td>${d.items.join('、')}</td><td>${d.partition||'<span style="color:#bbb;">无</span>'}</td></tr>`;

          } else if (sub.items) {

    html += `</div>`; // close doc-section

// ===== Part 2: Purchasing Materials =====
  if (opts.includePurchasing && standards.purchasingMaterials && standards.purchasingMaterials.length) {

              (item.headers||[]).forEach(h => { html += `<th style="padding:6px 8px;border:1px solid #E5DDD5;text-align:left;">${esc(h)}</th>`; });
              html += `</tr></thead><tbody>`;
              (item.rows||[]).forEach(row => {

            } else if (item.type==='steps') {
              html += `<ol style="margin:4px 0;padding-left:20px;font-size:11px;line-height:1.8;">`;
              (item.items||[]).forEach(it => { html += `<li>${esc(it)}</li>`; });

            } else if (item.type==='bullet') {
              html += `<ul style="margin:4px 0;padding-left:20px;font-size:11px;line-height:1.8;">`;
              (item.items||[]).forEach(it => { html += `<li>${esc(it)}</li>`; });

            } else if (item.type==='callout') {
              html += `<div style="background:#FFF8E6;padding:8px 12px;border-radius:6px;font-size:11px;margin:4px 0;color:#8B6914;border-left:3px solid #E8A020;">💡 ${esc(item.text||'').replace(/\n/g,'<br>')}</div>`;

            }
          });
          html += `</div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }
    partIdx++;
  }

    <div class="doc-footer-line"></div>

// ============ REFRESH FROM GITHUB ============
async function refreshFromGitHub() {
  const btn = document.getElementById('refreshBtn');
  const originalText = btn.textContent;
  btn.textContent = '⏳ 刷新中...';
  btn.disabled = true;

  try {
    // 使用 API 端点（无 CDN 缓存），正确解码 base64 内容
    // 注意：不能加 Cache-Control header，否则 CORS 预检失败；用 ?t=timestamp 绕过浏览器缓存即可
    const res = await fetch('https://api.github.com/repos/RainG0106/store-positioning-tool/contents/standards.json?t=' + Date.now(), {
      headers: { 'User-Agent': 'store-tool' }
    });
    if (res.ok) {
      const data = await res.json();
      // GitHub API 返回 base64 编码的 content，需解码
      const raw = atob(data.content.replace(/\s/g, ''));
      const bytes = Uint8Array.from(raw, c => c.charCodeAt(0));
      const text = new TextDecoder().decode(bytes);
      const parsed = JSON.parse(text);
      // 验证数据有效性
      if (!parsed || !Array.isArray(parsed.areas) || parsed.areas.length === 0) {
        throw new Error('Invalid data: empty or missing areas');
      }
      standards = parsed;
      localStorage.setItem('store_standards_cache', JSON.stringify(parsed));

      // Save update time
      const now = new Date();
      const timeStr = now.toLocaleString('zh-CN');
      localStorage.setItem('store_standards_last_update', timeStr);

      renderAreaList();
      updatePlaceholder();

      // Update time display
      const timeEl = document.getElementById('lastUpdateTime');
      if (timeEl) timeEl.textContent = '最后更新：' + timeStr;

      showToast('✅ 数据已刷新（' + timeStr + '）');
    } else {
      throw new Error('HTTP ' + res.status);
    }
  } catch(e) {
    console.warn('[refresh] GitHub fetch failed', e);
    showToast('❌ 刷新失败，请检查网络连接');
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

async function clearCache() {
  if (!confirm('确定清除本地缓存并重新从 GitHub 加载最新数据吗？\n\n清除后将从 GitHub 重新获取标准数据。')) return;
  localStorage.removeItem('store_standards_cache');
  localStorage.removeItem('store_standards_last_update');
  showToast('⏳ 正在从 GitHub 拉取最新数据...');

  // 立即强制拉取最新数据，而不是靠 reload 时的 fetch（可能被 CDN 缓存）
  try {
    const res = await fetch(GITHUB_RAW_BASE + '/standards.json?t=' + Date.now() + '&_=' + Math.random());
    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('store_standards_cache', JSON.stringify(data));
      const timeStr = new Date().toLocaleString('zh-CN');
      localStorage.setItem('store_standards_last_update', timeStr);
      showToast('✅ 已获取最新数据，正在刷新...');
      setTimeout(() => location.reload(), 300);
      return;
    }
  } catch (e) {
    console.warn('[clearCache] Fetch failed:', e);
  }

  showToast('⚠️ GitHub 拉取失败，将使用内置数据并刷新...');
  setTimeout(() => location.reload(), 800);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// --- Editor helpers ---
function sfAddRow(m, s, c) {
  const item = serviceFlowData.modules[m].sections[s].content[c];
  const colCount = (item.headers||[]).length || 2;
  const newRow = new Array(colCount).fill('');
  item.rows.push(newRow);
  showServiceFlow();
  showToast('✅ 已新增一行');
}
function sfDelRow(m, s, c, r) {
  if (!confirm('确定删除这一行吗？')) return;
  serviceFlowData.modules[m].sections[s].content[c].rows.splice(r, 1);
  showServiceFlow();
  showToast('✅ 已删除');
}
function sfAddItem(m, s, c) {
  const item = serviceFlowData.modules[m].sections[s].content[c];
  item.items.push('');
  showServiceFlow();
  showToast('✅ 已新增条目');
}
function sfDelItem(m, s, c, i) {
  if (!confirm('确定删除这条内容吗？')) return;
  serviceFlowData.modules[m].sections[s].content[c].items.splice(i, 1);
  showServiceFlow();
  showToast('✅ 已删除');
}

// --- Save ---
function saveServiceFlow() {
  const scopeInput = document.getElementById('sf-scope');
  if (scopeInput) serviceFlowData.scope = scopeInput.value.trim();

  // Save module titles
  document.querySelectorAll('.sf-mod-title').forEach(el => {
    const m = +el.dataset.m;
    serviceFlowData.modules[m].title = el.value.trim();
  });
  // Save section titles
  document.querySelectorAll('.sf-sec-title').forEach(el => {
    const m = +el.dataset.m, s = +el.dataset.s;
    serviceFlowData.modules[m].sections[s].title = el.value.trim();
  });
  // Save table cells
  document.querySelectorAll('.sf-cell').forEach(el => {
    const m = +el.dataset.m, s = +el.dataset.s, c = +el.dataset.c;
    const item = serviceFlowData.modules[m].sections[s].content[c];
    if ('h' in el.dataset) {
      item.headers[+el.dataset.h] = el.innerText.trim();
    } else if ('r' in el.dataset && 'col' in el.dataset) {
      item.rows[+el.dataset.r][+el.dataset.col] = el.innerText.trim();
    }
  });
  // Save list items
  document.querySelectorAll('.sf-li').forEach(el => {
    const m = +el.dataset.m, s = +el.dataset.s, c = +el.dataset.c, i = +el.dataset.i;
    serviceFlowData.modules[m].sections[s].content[c].items[i] = el.innerText.trim();
  });
  // Save text blocks (callout/code)
  document.querySelectorAll('.sf-text').forEach(el => {
    const m = +el.dataset.m, s = +el.dataset.s, c = +el.dataset.c;
    serviceFlowData.modules[m].sections[s].content[c].text = el.innerText.trim();
  });

  // Persist
  try {
    localStorage.setItem('workbuddy_service_flow', JSON.stringify(serviceFlowData));
    showToast('✅ 服务流程标准已保存到本地缓存');
  } catch(e) {
    alert('保存失败：' + e.message);
  }
}
